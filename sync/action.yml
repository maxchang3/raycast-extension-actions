name: "Sync raycast/extension Changes"
description: Store a Raycast extension in your own repo, and automatically create a PR with changes made in `raycast/extensions`
branding:
  icon: cast
  color: blue
inputs:
  github_access_token:
    description: A GitHub access token which will be used to create a PR to your repo with any changes
    required: true
  extension_name:
    description: The name of your extension. This should be the name of the folder in the `raycast/extensions` repo under `extensions/` where your extension lives.
    required: true
  raycast_extensions_source_repo:
    description: The source repository to pull changes from. Useful for testing.
    required: false
    default: raycast/extensions
  raycast_extensions_fork_full_name:
    description: The full name of your fork of the `raycast/extensions` repo (for example `timrogers/extensions`). If provided, the action will check for an active PR and sync from your fork's `ext/{extension_name}` branch if a PR is open.
    required: false
    default: ""
  ignore_paths:
    description: A list of files or directories to ignore when pulling changes (e.g. `CHANGELOG.md`).
    required: false
    default: ""
outputs:
  pull_request_url:
    description: The URL of the pull request to the extension repo
    value: ${{ steps.create_pull_request.outputs.url }}
runs:
  using: composite
  steps:
    - name: Check out the current repo
      uses: actions/checkout@v6
      with:
        path: my-extension
        fetch-depth: 0

    - name: Check out the target extensions repo
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.raycast_extensions_source_repo }}
        path: raycast-extensions
        fetch-depth: 0
        filter: blob:none
        sparse-checkout: |
          extensions/${{ inputs.extension_name }}

    - name: Fetch from fork if active PR exists
      id: fetch_fork
      env:
        GH_TOKEN: ${{ inputs.github_access_token }}
      run: |
        if [ -n "${{ inputs.raycast_extensions_fork_repo }}" ]; then
          FORK_OWNER=$(echo "${{ inputs.raycast_extensions_fork_repo }}" | cut -d'/' -f1)
          
          # Check if there is an open PR from the fork's ext/ branch
          PR_COUNT=$(gh pr list --repo ${{ inputs.raycast_extensions_source_repo }} --author "$FORK_OWNER" --state open --search "head:ext/${{ inputs.extension_name }}" --json number --jq 'length' 2>/dev/null || echo 0)
          
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "Found active PR from $FORK_OWNER:ext/${{ inputs.extension_name }}. Fetching from fork..."
            git remote add fork https://github.com/${{ inputs.raycast_extensions_fork_repo }}.git
            git fetch fork ext/${{ inputs.extension_name }}
            # Check out the fork branch
            git checkout -b fork-branch FETCH_HEAD
          else
            echo "No active PR found from fork. Using upstream main."
          fi
        fi
      shell: bash
      working-directory: raycast-extensions

    - name: Get SHA of most recent upstream extension changes
      id: get_most_recent_upstream_changes_sha
      run: |
        if [ -d "extensions/${{ inputs.extension_name }}" ]; then
          echo "SHA=$(git --no-pager log -1 --format="%H" extensions/${{ inputs.extension_name }})" >> $GITHUB_OUTPUT
        else
          echo "SHA=" >> $GITHUB_OUTPUT
        fi
      shell: bash
      working-directory: raycast-extensions

    - name: Copy upstream changes
      env:
        IGNORE_PATHS: ${{ inputs.ignore_paths }}
      run: |
        if [ ! -d "extensions/${{ inputs.extension_name }}" ]; then
          echo "Extension not found in upstream. Skipping..."
          exit 0
        fi
        IGNORE_ARGS=""
        if [ -n "$IGNORE_PATHS" ]; then
          for path in $IGNORE_PATHS; do
            if [ -n "$path" ]; then
              IGNORE_ARGS="$IGNORE_ARGS --exclude=$path"
            fi
          done
        fi
        rsync -a $IGNORE_ARGS extensions/${{ inputs.extension_name }}/ ../my-extension/
      shell: bash
      working-directory: raycast-extensions

    - name: Check for changes
      id: check_changes
      run: |
        if [[ -z "$(git status --porcelain)" ]]; then
          echo "changed=0" >> $GITHUB_OUTPUT
          echo "No changes to pull."
        else
          echo "changed=1" >> $GITHUB_OUTPUT
          echo "Changes detected."
        fi
      shell: bash
      working-directory: my-extension

    - name: Create branch for any upstream changes
      run: git checkout -b upstream-${{ steps.get_most_recent_upstream_changes_sha.outputs.SHA }}
      shell: bash
      working-directory: my-extension
      if: steps.check_changes.outputs.changed == '1'

    - name: Stage changes, ready to commit
      run: git add --all .
      shell: bash
      working-directory: my-extension
      if: steps.check_changes.outputs.changed == '1'

    - name: Configure Git user information so we can commit
      run: git config user.name "github-actions[bot]" && git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      shell: bash
      working-directory: my-extension
      if: steps.check_changes.outputs.changed == '1'

    - name: Commit upstream changes to branch
      run: git commit -m 'Sync upstream changes from ${{ steps.get_most_recent_upstream_changes_sha.outputs.SHA }} and earlier'
      shell: bash
      working-directory: my-extension
      if: steps.check_changes.outputs.changed == '1'

    - name: Push upstream changes to our repo
      run: git push -f origin upstream-${{ steps.get_most_recent_upstream_changes_sha.outputs.SHA }}
      shell: bash
      working-directory: my-extension
      if: steps.check_changes.outputs.changed == '1'

    - name: Create pull request (if it doesn't already exist)
      id: create_pull_request
      # If there is already a PR for this branch, then we'll skip creating a new PR and return the URL of the existing one
      run: |
        pr_url="$(gh pr create --head upstream-${{ steps.get_most_recent_upstream_changes_sha.outputs.SHA }} --title "Sync upstream changes from ${{ steps.get_most_recent_upstream_changes_sha.outputs.SHA }} and earlier" --body "This PR should be merged without modifications so that this repo reflects what is upstream in the raycast/extensions repo.")"
        echo "url=$pr_url" >> $GITHUB_OUTPUT
      shell: bash
      working-directory: my-extension
      env:
        GITHUB_TOKEN: ${{ inputs.github_access_token }}
      if: steps.check_changes.outputs.changed == '1'
